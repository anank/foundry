<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Foundry{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css" />
  {% block head %}{% endblock %}
</head>
<body style="background-color:#080b0f;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;">

  <!-- Top nav -->
  <nav style="background:#0d1117;border-bottom:1px solid #1e2d3d;position:sticky;top:0;z-index:50;">
    <div style="max-width:1280px;margin:0 auto;padding:0 1.5rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;height:52px;">

        <!-- Brand -->
        <a href="/" style="display:flex;align-items:center;gap:0.6rem;text-decoration:none;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:#f0a500;background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.25);padding:0.2rem 0.5rem;border-radius:3px;">SYS</span>
          <span style="font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:1rem;color:#e2e8f0;letter-spacing:-0.01em;">Foundry</span>
        </a>

        <!-- Desktop nav -->
        <div style="display:flex;align-items:center;gap:0.25rem;">
          <a href="/"               class="nav-link {% if request.url.path == '/' %}active{% endif %}">Home</a>
          <a href="/projects"       class="nav-link {% if '/projects' in request.url.path %}active{% endif %}">Projects</a>
          <a href="/devices"        class="nav-link {% if '/devices' in request.url.path %}active{% endif %}">Devices</a>
          <a href="/triage"         class="nav-link {% if '/triage' in request.url.path %}active{% endif %}">Triage</a>
          <a href="/review"         class="nav-link {% if '/review' in request.url.path %}active{% endif %}">Review</a>
          <a href="/graveyard"      class="nav-link {% if '/graveyard' in request.url.path %}active{% endif %}">Graveyard</a>
          <a href="/settings/models" class="nav-link {% if '/settings' in request.url.path %}active{% endif %}">Settings</a>
        </div>

        <!-- Mobile toggle -->
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
          style="display:none;padding:0.4rem;color:#4a5568;background:none;border:none;cursor:pointer;"
          class="md-hidden" aria-label="Menu">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden" style="border-top:1px solid #1e2d3d;background:#0d1117;padding:0.5rem 1.5rem 1rem;">
      <div style="display:flex;flex-direction:column;gap:0.25rem;">
        <a href="/"               class="nav-link">Home</a>
        <a href="/projects"       class="nav-link">Projects</a>
        <a href="/devices"        class="nav-link">Devices</a>
        <a href="/triage"         class="nav-link">Triage</a>
        <a href="/review"         class="nav-link">Review</a>
        <a href="/graveyard"      class="nav-link">Graveyard</a>
        <a href="/settings/models" class="nav-link">Settings</a>
      </div>
    </div>
  </nav>

  <!-- Flash -->
  <div id="flash" style="max-width:1280px;margin:0 auto;width:100%;padding:0 1.5rem;">
    {% block flash %}{% endblock %}
  </div>

  <!-- Main -->
  <main style="flex:1;max-width:1280px;margin:0 auto;width:100%;padding:2rem 1.5rem;">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer style="border-top:1px solid #1e2d3d;padding:1rem 1.5rem;text-align:center;">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;color:#4a5568;text-transform:uppercase;">
      Foundry &mdash; kill more ideas, ship fewer regrets
    </span>
  </footer>

</body>
</html>
