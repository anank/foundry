{% extends "base.html" %}
{% block title %}New Project — Foundry{% endblock %}
{% block content %}

<div style="max-width:640px;" class="animate-in">
  <div style="margin-bottom:2rem;">
    <a href="/projects" style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#4a5568;text-decoration:none;text-transform:uppercase;letter-spacing:0.06em;"
       onmouseover="this.style.color='#f0a500'" onmouseout="this.style.color='#4a5568'">← Projects</a>
    <h1 class="page-title" style="margin-top:0.75rem;">New Project</h1>
  </div>

  <form method="post" action="/projects/new" style="display:flex;flex-direction:column;gap:1.25rem;">

    <div class="card" style="padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;">
      <div class="section-label">Identity</div>

      <div>
        <label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:#8899aa;margin-bottom:0.4rem;">
          Name <span style="color:#ef4444;">*</span>
        </label>
        <input name="name" required autofocus placeholder="my-project-slug"
          class="input input-mono" />
        <p style="font-size:0.7rem;color:#4a5568;margin-top:0.3rem;font-family:'IBM Plex Mono',monospace;">lowercase-hyphenated · used as url slug</p>
      </div>

      <div>
        <label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:#8899aa;margin-bottom:0.4rem;">Description</label>
        <input name="description" placeholder="One-line summary" class="input" />
      </div>

      <div>
        <label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:#8899aa;margin-bottom:0.4rem;">GitHub URL</label>
        <input name="github_url" placeholder="https://github.com/owner/repo" class="input input-mono" />
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div>
          <label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:#8899aa;margin-bottom:0.4rem;">Status</label>
          <select name="status" class="input">
            <option value="active" selected>active</option>
            <option value="parked">parked</option>
            <option value="done">done</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;color:#8899aa;margin-bottom:0.4rem;">Priority</label>
          <select name="priority" class="input">
            <option value="high">high</option>
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card" style="padding:1.5rem;display:flex;flex-direction:column;gap:0.75rem;">
      <div class="section-label">Spec</div>
      <textarea name="spec" rows="8" placeholder="Project spec, goals, constraints, acceptance criteria…"
        class="input input-mono" style="min-height:160px;"></textarea>
    </div>

    <div style="display:flex;gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Create Project</button>
      <a href="/projects" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
